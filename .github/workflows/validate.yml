name: Validate Agents

on:
  pull_request:
    paths:
      - 'agents/**'
  push:
    branches: [main]
    paths:
      - 'agents/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install abox CLI
        run: go install go.zoe.im/agentbox/cmd/abox@latest

      - name: Validate all agents
        run: |
          failed=0
          for dir in agents/*/; do
            if [ -f "$dir/agent.yaml" ]; then
              echo "Validating $dir..."
              if ! abox agent validate "$dir/agent.yaml"; then
                echo "❌ FAILED: $dir"
                failed=1
              else
                echo "✅ OK: $dir"
              fi
            fi
          done
          exit $failed

  index:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install abox CLI
        run: go install go.zoe.im/agentbox/cmd/abox@latest

      - name: Generate index
        run: abox agent index agents/ > index.json

      - name: Commit index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json
          git diff --staged --quiet || git commit -m "chore: update agent index"
          git push
